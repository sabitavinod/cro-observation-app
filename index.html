<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MGS Classroom Observation</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3c6e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MGS CRO">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
:root {
  --blue:#1a3c6e; --blue-mid:#2e6da4; --blue-light:#e8f0f9;
  --green:#1e7e34; --green-light:#d4edda;
  --red:#c0392b; --red-light:#fdecea;
  --orange:#e67e22; --orange-light:#fef3e2;
  --gray:#6c757d; --gray-light:#f8f9fa;
  --border:#dee2e6; --white:#ffffff;
  --shadow:0 2px 12px rgba(0,0,0,0.1); --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#333;min-height:100vh;}
.screen{display:none;} .screen.active{display:block;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a3c6e,#2e6da4);padding:20px;}
.login-card{background:white;border-radius:16px;padding:40px 32px;width:100%;max-width:400px;
  box-shadow:0 8px 32px rgba(0,0,0,0.2);text-align:center;}
.login-logo{font-size:48px;margin-bottom:12px;}
.login-card h2{color:var(--blue);font-size:22px;margin-bottom:4px;}
.login-card p{color:var(--gray);font-size:13px;margin-bottom:28px;}
.login-card input{width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:8px;
  font-size:15px;margin-bottom:14px;outline:none;transition:border .2s;}
.login-card input:focus{border-color:var(--blue-mid);}
.login-error{color:var(--red);font-size:13px;margin-top:10px;min-height:18px;}

/* HEADER */
.app-header{background:var(--blue);color:white;padding:12px 16px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.app-header h1{font-size:15px;font-weight:600;}
.user-info{font-size:11px;opacity:.85;text-align:right;}
.user-info span{display:block;}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:white;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;margin-top:3px;}

/* LAYOUT */
.main-content{padding:14px;max-width:720px;margin:0 auto;}

/* NAV */
.nav-tabs{display:flex;background:white;border-radius:var(--radius);padding:5px;
  margin-bottom:14px;box-shadow:var(--shadow);overflow-x:auto;gap:4px;}
.nav-tab{flex:1;min-width:72px;padding:8px 6px;text-align:center;border-radius:7px;
  font-size:11px;font-weight:500;cursor:pointer;color:var(--gray);border:none;
  background:none;transition:all .2s;white-space:nowrap;}
.nav-tab.active{background:var(--blue);color:white;}
.nav-tab:hover:not(.active){background:var(--blue-light);color:var(--blue);}

/* CARDS */
.card{background:white;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-title{font-size:14px;font-weight:600;color:var(--blue);margin-bottom:12px;
  padding-bottom:8px;border-bottom:2px solid var(--blue-light);}

/* FORMS */
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:4px;}
.req{color:var(--red);}
.form-control{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  font-size:14px;background:white;outline:none;transition:border .2s;appearance:none;}
.form-control:focus{border-color:var(--blue-mid);}
.form-control:disabled{background:var(--gray-light);color:var(--gray);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* RATING */
.rating-group{margin-bottom:14px;padding:12px;background:var(--gray-light);border-radius:8px;}
.rating-area-name{font-size:13px;color:var(--blue);font-weight:600;margin-bottom:8px;}
.rating-btns{display:flex;gap:6px;margin-bottom:8px;}
.rating-btn{flex:1;padding:10px 2px;border:2px solid var(--border);border-radius:7px;
  background:white;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;}
.rating-btn:hover{border-color:var(--blue-mid);background:var(--blue-light);}
.rating-btn.sel-4{background:#1e7e34;border-color:#1e7e34;color:white;}
.rating-btn.sel-3{background:#2e6da4;border-color:#2e6da4;color:white;}
.rating-btn.sel-2{background:#e67e22;border-color:#e67e22;color:white;}
.rating-btn.sel-1{background:#c0392b;border-color:#c0392b;color:white;}

/* RECORDING */
.record-section{background:linear-gradient(135deg,#1a3c6e,#2e6da4);border-radius:var(--radius);
  padding:18px;text-align:center;color:white;margin-bottom:12px;}
.record-title{font-size:15px;font-weight:600;margin-bottom:4px;}
.record-sub{font-size:12px;opacity:.8;margin-bottom:14px;}
.record-timer{font-size:36px;font-weight:700;font-family:monospace;margin:8px 0;letter-spacing:2px;}
.record-status{font-size:12px;margin-bottom:12px;opacity:.85;min-height:18px;}
.btn-rec{padding:12px 24px;border-radius:30px;border:none;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;margin:3px;}
.btn-rec-start{background:#e74c3c;color:white;}
.btn-rec-start:hover{background:#c0392b;}
.btn-rec-stop{background:#f39c12;color:white;}
.btn-rec-stop:hover{background:#d68910;}
.btn-rec:disabled{background:#aaa;cursor:not-allowed;}
.rec-dot{display:inline-block;width:9px;height:9px;border-radius:50%;
  background:#e74c3c;margin-right:5px;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.rec-ready{background:rgba(255,255,255,.15);border-radius:7px;padding:8px;font-size:12px;margin-top:10px;}

/* TOGGLE */
.toggle-group{display:flex;gap:8px;}
.toggle-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:8px;
  background:white;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.toggle-btn.sel-yes{background:var(--red);border-color:var(--red);color:white;}
.toggle-btn.sel-no{background:var(--green);border-color:var(--green);color:white;}
.toggle-btn.sel-active{background:var(--blue);border-color:var(--blue);color:white;}

/* BUTTONS */
.btn-primary{width:100%;padding:13px;background:var(--blue);color:white;border:none;
  border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-primary:hover{background:var(--blue-mid);}
.btn-primary:disabled{background:#aaa;cursor:not-allowed;}
.btn-submit{width:100%;padding:13px;background:var(--green);color:white;border:none;
  border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.btn-submit:hover{background:#155724;}
.btn-submit:disabled{background:#aaa;cursor:not-allowed;}
.btn-secondary{width:100%;padding:11px;background:white;color:var(--blue);
  border:2px solid var(--blue);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn-secondary:hover{background:var(--blue-light);}
.btn-danger{padding:9px 16px;background:var(--red);color:white;border:none;border-radius:7px;font-size:12px;cursor:pointer;}
.btn-success{padding:9px 16px;background:var(--green);color:white;border:none;border-radius:7px;font-size:12px;cursor:pointer;}
.btn-sm{padding:7px 14px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-submitted{background:#cce5ff;color:#004085;}
.badge-acknowledged{background:var(--green-light);color:#155724;}
.badge-action{background:var(--orange-light);color:#7d4e00;}
.badge-closed{background:#e2e3e5;color:#383d41;}
.badge-revision{background:var(--red-light);color:#721c24;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-card{background:white;border-radius:var(--radius);padding:12px;text-align:center;box-shadow:var(--shadow);}
.stat-number{font-size:26px;font-weight:700;color:var(--blue);}
.stat-label{font-size:10px;color:var(--gray);margin-top:2px;}

/* RECORDS */
.record-item{background:white;border-radius:var(--radius);padding:14px;margin-bottom:10px;
  box-shadow:var(--shadow);border-left:4px solid var(--blue-mid);}
.record-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.record-item-title{font-size:14px;font-weight:600;color:var(--blue);}
.record-item-sub{font-size:12px;color:var(--gray);margin-top:2px;}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0;}
.score-item{background:var(--blue-light);border-radius:6px;padding:7px 9px;}
.score-label{font-size:10px;color:var(--blue);font-weight:600;}
.score-val{font-size:16px;font-weight:700;color:var(--blue);}

/* ASSIGNMENT BUILDER */
.assignment-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;
  align-items:center;margin-bottom:8px;background:var(--gray-light);padding:8px;border-radius:7px;}
.assignment-row select{padding:8px;border:1.5px solid var(--border);border-radius:6px;
  font-size:13px;background:white;}
.btn-remove-row{background:var(--red);color:white;border:none;border-radius:6px;
  padding:8px 10px;cursor:pointer;font-size:14px;}
.btn-add-row{background:var(--blue-light);color:var(--blue);border:2px dashed var(--blue-mid);
  border-radius:7px;padding:10px;width:100%;cursor:pointer;font-size:13px;font-weight:600;margin-top:6px;}

/* LOADING */
.loading{text-align:center;padding:40px 20px;color:var(--gray);}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top:3px solid var(--blue);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#333;color:white;padding:11px 18px;border-radius:8px;font-size:13px;
  z-index:9999;display:none;max-width:320px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.3);}
#toast.success{background:var(--green);}
#toast.error{background:var(--red);}

.empty{text-align:center;padding:40px 20px;color:var(--gray);}
.empty-icon{font-size:38px;margin-bottom:8px;}
.section-hdr{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;
  letter-spacing:.5px;margin:14px 0 8px;}
.info-box{background:var(--blue-light);border-radius:8px;padding:10px 12px;
  font-size:12px;color:var(--blue);margin-bottom:12px;}
.info-box.orange{background:var(--orange-light);color:#7d4e00;}
.info-box.green{background:var(--green-light);color:#155724;}

@media(max-width:400px){
  .form-row{grid-template-columns:1fr;}
  .form-row-3{grid-template-columns:1fr 1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .assignment-row{grid-template-columns:1fr 1fr auto;grid-template-rows:auto auto;}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">🏫</div>
      <h2>MGS Classroom Observation</h2>
      <p>Meghe Group of Schools</p>
      <input type="email" id="login-email" placeholder="Enter your school email" autocomplete="email"/>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading" class="screen">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div class="loading"><div class="spinner"></div><div>Loading...</div></div>
  </div>
</div>

<!-- APP -->
<div id="screen-app" class="screen">
  <div class="app-header">
    <h1>MGS Classroom Observation</h1>
    <div class="user-info">
      <span id="header-name">—</span>
      <span id="header-role">—</span>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="main-content">
    <div class="nav-tabs" id="nav-tabs"></div>
    <div id="tab-content"></div>
  </div>
</div>

<!-- TEACHER SETUP -->
<div id="screen-setup" class="screen">
  <div class="app-header">
    <h1>MGS Classroom Observation</h1>
    <div class="user-info">
      <span id="setup-name">—</span>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="main-content">
    <div class="card">
      <div class="card-title">👋 Welcome — Set Up Your Classes</div>
      <div class="info-box">Add all the classes and sections you teach. You can update these later from your profile.</div>
      <div id="assignment-rows"></div>
      <button class="btn-add-row" onclick="addAssignmentRow()">＋ Add Another Class</button>
      <button class="btn-submit" style="margin-top:14px;" onclick="saveTeacherSetup()">✅ Save and Continue</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhkhinZ9EmTBhNsCIJtfCA-MBDGtsuve2R2inw8kG7Tq31OlEGhZdZQ5_yXiHMd0ppSA/exec";

const AREA_NAMES = [
  "Implementation of Pedagogy",
  "Student Involvement",
  "Language and Subject-Specific Terminology",
  "Learning Environment",
  "Utility of Resources"
];

const SCHOOL_CLASSES = {
  "SOS Atrey":             ["Grade 1","Grade 2","Grade 3","Grade 4","Grade 5","Grade 6","Grade 7","Grade 8","Grade 9","Grade 10"],
  "SOS Wana":              ["Nursery","KG1","KG2","Grade 1","Grade 2","Grade 3","Grade 4","Grade 5","Grade 6","Grade 7","Grade 8","Grade 9","Grade 10"],
  "SOS Wardha":            ["Nursery","KG1","KG2","Grade 1","Grade 2","Grade 3","Grade 4","Grade 5","Grade 6","Grade 7","Grade 8","Grade 9","Grade 10"],
  "SOS CUBS Ram Nagar":    ["Nursery","KG1","KG2"],
  "SOS CUBS Pratap Nagar": ["Nursery","KG1","KG2"]
};

const SECTIONS = ["A","B","C","D","E","F","G"];

const OBSERVER_ROLES = ["Principal","VicePrincipal","PPHead","CoordinatorPrimary","CoordinatorHighSchool","Supervisor","SuperAdmin","SchoolAdmin"];

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let APP = {
  user: null,
  formData: { ratings:{}, followUp:'No', bestPrac:'No' },
  rec: { mediaRecorder:null, chunks:[], blob:null, timer:null, seconds:0, active:false },
  cache: { teachers:[], classAccess:[], subjects:[] },
  setupRows: 0
};

// ══════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=type;t.style.display='block';setTimeout(()=>t.style.display='none',3200);}
async function apiGet(p){const url=SCRIPT_URL+'?'+new URLSearchParams(p);const r=await fetch(url);return r.json();}
async function apiPost(b){const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(b)});return r.json();}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}
function badgeClass(s){if(!s)return'submitted';const l=s.toLowerCase();if(l==='submitted')return'submitted';if(l==='acknowledged')return'acknowledged';if(l.includes('action')||l.includes('revision'))return'action';if(l==='closed')return'closed';return'submitted';}

// ══════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════
async function doLogin(){
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const err   = document.getElementById('login-error');
  err.textContent = '';
  if(!email){ err.textContent='Please enter your email.'; return; }
  if(!email.endsWith('@mgsnagpur.org')){ err.textContent='Please use your @mgsnagpur.org school email.'; return; }
  showScreen('loading');
  try{
    const res = await apiGet({action:'getUser', email});
    if(res.status==='success' && res.user.isActive==='TRUE'){
      APP.user = res.user;
      if(res.user.role==='Teacher'){
        await checkTeacherSetup();
      } else {
        initApp();
      }
    } else {
      showScreen('login');
      err.textContent = res.status==='success' ? 'Your account is inactive. Contact the School Admin.' : 'Email not found. Contact the School Admin.';
    }
  } catch(e){
    showScreen('login');
    err.textContent='Connection error. Please try again.';
  }
}

async function checkTeacherSetup(){
  try{
    const res = await apiGet({action:'getMyAssignments', teacherEmail:APP.user.email});
    if(res.hasAssignments){
      initApp();
    } else {
      showTeacherSetup();
    }
  } catch(e){ initApp(); }
}

function doLogout(){
  APP={user:null,formData:{ratings:{},followUp:'No',bestPrac:'No'},rec:{mediaRecorder:null,chunks:[],blob:null,timer:null,seconds:0,active:false},cache:{teachers:[],classAccess:[],subjects:[]},setupRows:0};
  document.getElementById('login-email').value='';
  document.getElementById('login-error').textContent='';
  showScreen('login');
}
document.getElementById('login-email').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ══════════════════════════════════════════════════════
// TEACHER FIRST-LOGIN SETUP
// ══════════════════════════════════════════════════════
function showTeacherSetup(){
  document.getElementById('setup-name').textContent = APP.user.fullName;
  APP.setupRows = 0;
  document.getElementById('assignment-rows').innerHTML = '';
  addAssignmentRow();
  showScreen('setup');
}

function addAssignmentRow(){
  APP.setupRows++;
  const idx = APP.setupRows;
  const school = APP.user.schoolName;
  const classes = SCHOOL_CLASSES[school] || [];
  const classOpts = classes.map(c=>`<option value="${c}">${c}</option>`).join('');
  const secOpts = SECTIONS.map(s=>`<option value="${s}">${s}</option>`).join('');

  const div = document.createElement('div');
  div.className = 'assignment-row';
  div.id = 'arow-'+idx;
  div.innerHTML = `
    <select class="form-control" id="asubj-${idx}"><option value="">Subject</option><option value="${APP.user.department}">${APP.user.department}</option></select>
    <select class="form-control" id="acls-${idx}"><option value="">Class</option>${classOpts}</select>
    <select class="form-control" id="asec-${idx}"><option value="">Section</option>${secOpts}</select>
    <button class="btn-remove-row" onclick="removeAssignmentRow(${idx})">✕</button>
  `;
  document.getElementById('assignment-rows').appendChild(div);
}

function removeAssignmentRow(idx){
  const el = document.getElementById('arow-'+idx);
  if(el) el.remove();
}

async function saveTeacherSetup(){
  const rows = document.querySelectorAll('[id^="arow-"]');
  const assignments = [];
  let valid = true;

  rows.forEach(row=>{
    const idx = row.id.replace('arow-','');
    const subj = document.getElementById('asubj-'+idx)?.value;
    const cls  = document.getElementById('acls-'+idx)?.value;
    const sec  = document.getElementById('asec-'+idx)?.value;
    if(subj && cls && sec){
      assignments.push({subject:subj, class:cls, section:sec});
    } else if(subj||cls||sec){
      valid = false;
    }
  });

  if(!valid){ toast('Please complete all rows or remove incomplete ones','error'); return; }
  if(assignments.length===0){ toast('Please add at least one class','error'); return; }

  const btn = document.querySelector('#screen-setup .btn-submit');
  btn.disabled=true; btn.textContent='Saving...';

  try{
    const res = await apiPost({
      action:'saveAssignments',
      teacherEmail:APP.user.email,
      teacherName:APP.user.fullName,
      schoolName:APP.user.schoolName,
      department:APP.user.department,
      assignments
    });
    if(res.status==='success'){
      toast('Classes saved successfully ✅','success');
      initApp();
    } else {
      toast('Error: '+res.message,'error');
      btn.disabled=false; btn.textContent='✅ Save and Continue';
    }
  } catch(e){
    toast('Connection error','error');
    btn.disabled=false; btn.textContent='✅ Save and Continue';
  }
}

// ══════════════════════════════════════════════════════
// INIT APP
// ══════════════════════════════════════════════════════
function initApp(){
  const u = APP.user;
  document.getElementById('header-name').textContent = u.fullName;
  document.getElementById('header-role').textContent = u.role+' — '+u.schoolName;
  const tabs = getTabsForRole(u.role);
  renderNavTabs(tabs);
  showScreen('app');
  switchTab(tabs[0].id);
}

function getTabsForRole(role){
  const tabs=[];
  if(OBSERVER_ROLES.includes(role)){
    tabs.push({id:'new-cro',label:'📋 New CRO'});
    tabs.push({id:'my-cros',label:'📁 My CROs'});
    tabs.push({id:'verify',label:'✅ Verify'});
    tabs.push({id:'dashboard',label:'📊 Dashboard'});
  }
  if(role==='Teacher'){
    tabs.push({id:'my-reports',label:'📄 Reports'});
    tabs.push({id:'pending-ack',label:'🔔 Acknowledge'});
    tabs.push({id:'action-taken',label:'📝 Action Taken'});
    tabs.push({id:'my-profile',label:'👤 My Classes'});
  }
  if(role==='SchoolAdmin'||role==='SuperAdmin'){
    tabs.push({id:'manage-users',label:'👥 Users'});

    tabs.push({id:'dashboard',label:'📊 Dashboard'});
  }

    tabs.push({id:'dashboard',label:'📊 Dashboard'});
  }
  return tabs;
}

function renderNavTabs(tabs){
  document.getElementById('nav-tabs').innerHTML = tabs.map(t=>
    `<button class="nav-tab" data-id="${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(id){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
  renderTab(id);
}

async function renderTab(id){
  const el = document.getElementById('tab-content');
  el.innerHTML=`<div class="loading"><div class="spinner"></div><div>Loading...</div></div>`;
  if(id==='new-cro')       await renderNewCRO(el);
  else if(id==='my-cros')  await renderMyCROs(el);
  else if(id==='verify')   await renderVerify(el);
  else if(id==='dashboard') await renderDashboard(el);
  else if(id==='my-reports') await renderMyReports(el);
  else if(id==='pending-ack') await renderPendingAck(el);
  else if(id==='action-taken') await renderActionTaken(el);
  else if(id==='my-profile') renderMyProfile(el);
  else if(id==='manage-users') renderManageUsers(el);
  else if(id==='bulk-upload') renderBulkUpload(el);
  else el.innerHTML=`<div class="empty"><div class="empty-icon">🚧</div>Coming soon</div>`;
}

// ── RECORDING ──────────────────────────────────────────
async function startRec(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    APP.rec.chunks=[]; APP.rec.blob=null;
    APP.rec.mediaRecorder = new MediaRecorder(stream);
    APP.rec.mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) APP.rec.chunks.push(e.data); };
    APP.rec.mediaRecorder.onstop = ()=>{
      APP.rec.blob = new Blob(APP.rec.chunks,{type:'audio/webm'});
      document.getElementById('rec-ready').style.display='block';
      document.getElementById('rec-status').textContent='Recording complete ✓';
      stream.getTracks().forEach(t=>t.stop());
    };
    APP.rec.mediaRecorder.start();
    APP.rec.active=true; APP.rec.seconds=0;
    APP.rec.timer = setInterval(()=>{
      APP.rec.seconds++;
      const m=String(Math.floor(APP.rec.seconds/60)).padStart(2,'0');
      const s=String(APP.rec.seconds%60).padStart(2,'0');
      document.getElementById('rec-timer').textContent=m+':'+s;
    },1000);
    document.getElementById('btn-start').disabled=true;
    document.getElementById('btn-stop').disabled=false;
    document.getElementById('rec-status').innerHTML='<span class="rec-dot"></span>Recording in progress...';
    toast('Recording started','success');
  } catch(e){ toast('Microphone access denied. Please allow microphone permission.','error'); }
}

function stopRec(){
  if(APP.rec.mediaRecorder && APP.rec.active){
    APP.rec.mediaRecorder.stop(); APP.rec.active=false;
    clearInterval(APP.rec.timer);
    document.getElementById('btn-start').disabled=false;
    document.getElementById('btn-stop').disabled=true;
    toast('Recording stopped','success');
  }
}

function blobToBase64(blob){
  return new Promise(res=>{const r=new FileReader();r.onloadend=()=>res(r.result.split(',')[1]);r.readAsDataURL(blob);});
}

// ── SUBMIT CRO ─────────────────────────────────────────
async function submitCRO(){
  const teacherEl = document.getElementById('f-teacher');
  const cls       = document.getElementById('f-class').value;
  const section   = document.getElementById('f-section').value;
  const subject   = document.getElementById('f-subject').value;
  const topic     = document.getElementById('f-topic').value.trim();
  const good      = document.getElementById('f-good').value.trim();

  if(!teacherEl.value){ toast('Please select a teacher','error'); return; }
  if(!cls){ toast('Please select a class','error'); return; }
  if(!section){ toast('Please select a section','error'); return; }
  if(!subject){ toast('Please select a subject','error'); return; }
  if(!topic){ toast('Please enter the topic','error'); return; }
  if(!good){ toast('Please enter good practices observed','error'); return; }
  if(Object.keys(APP.formData.ratings).length<5){ toast('Please rate all 5 observation areas','error'); return; }

  const btn=document.getElementById('btn-submit-cro');
  btn.disabled=true; btn.textContent='Submitting...';

  const teacherObj = APP.cache.teachers.find(t=>t.teacherEmail===teacherEl.value);
  const teacherName = teacherObj ? teacherObj.teacherName : teacherEl.value;

  let audioBase64='', audioFileName='';
  if(APP.rec.blob){
    audioBase64 = await blobToBase64(APP.rec.blob);
    const d=new Date().toISOString().split('T')[0];
    const sch=APP.user.schoolName.replace(/\s+/g,'_');
    const obs=APP.user.fullName.replace(/\s+/g,'');
    const tch=teacherName.replace(/\s+/g,'');
    const cl=cls.replace(/\s+/g,'');
    audioFileName=`${sch}_${obs}_${tch}_${cl}${section}_${d}.webm`;
  }

  const payload={
    action:'submitCRO',
    schoolName:APP.user.schoolName,
    observerEmail:APP.user.email,
    observerName:APP.user.fullName,
    observerDesignation:APP.user.role,
    teacherEmail:teacherEl.value,
    teacherName,
    department:teacherObj?.department||APP.user.department,
    class:cls, section, subject,
    subjectType:document.getElementById('f-subjecttype').value,
    topic,
    period:document.getElementById('f-period').value,
    croType:document.getElementById('f-crotype').value,
    area1Score:APP.formData.ratings[1]||'',
    area1Remarks:document.getElementById('rem-1').value,
    area2Score:APP.formData.ratings[2]||'',
    area2Remarks:document.getElementById('rem-2').value,
    area3Score:APP.formData.ratings[3]||'',
    area3Remarks:document.getElementById('rem-3').value,
    area4Score:APP.formData.ratings[4]||'',
    area4Remarks:document.getElementById('rem-4').value,
    area5Score:APP.formData.ratings[5]||'',
    area5Remarks:document.getElementById('rem-5').value,
    goodPractices:good,
    areasForImprovement:document.getElementById('f-improve').value,
    supportNeeded:document.getElementById('f-support').value,
    followUpRequired:APP.formData.followUp,
    bestPracticeShareable:APP.formData.bestPrac,
    actionDueDate:document.getElementById('f-duedate')?document.getElementById('f-duedate').value:'',
    audioBase64, audioFileName
  };

  try{
    const res=await apiPost(payload);
    if(res.status==='success'){
      toast('CRO submitted successfully ✅','success');
      APP.rec={mediaRecorder:null,chunks:[],blob:null,timer:null,seconds:0,active:false};
      switchTab('my-cros');
    } else {
      toast('Submission failed: '+res.message,'error');
      btn.disabled=false; btn.textContent='✅ Submit CRO Report';
    }
  } catch(e){
    toast('Connection error. Please try again.','error');
    btn.disabled=false; btn.textContent='✅ Submit CRO Report';
  }
}

    const pending=(res.items||[]).filter(i=>i.FinalStatus==='Open');
    if(!pending.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">✅</div><p>No pending action items.</p></div>`; return; }
    el.innerHTML=`<div class="section-hdr">Pending Action Taken (${pending.length})</div>`+
      pending.map((item,idx)=>`
        <div class="record-item">
          <div class="record-item-title">Action Required</div>
          <div class="record-item-sub">Record: ${item.CRORecordID}</div>
          <div class="info-box orange" style="margin-top:8px;"><strong>Action Point:</strong><br>${item.ActionPoint||'—'}</div>
          ${item.VerificationStatus==='Revision Required'?`<div class="info-box" style="background:var(--red-light);color:#721c24;"><strong>Revision Requested:</strong> ${item.VerificationRemarks||''}</div>`:''}
          <div class="form-group" style="margin-top:8px;">
            <label class="form-label">Your Action Taken <span class="req">*</span></label>
            <textarea class="form-control" id="act-${idx}" rows="3" placeholder="Describe what you did to address this">${item.TeacherActionTaken||''}</textarea>
          </div>
          <button class="btn-submit" onclick="submitAction('${item.CRORecordID}',${idx},this)">📝 Submit Action Taken</button>
        </div>`).join('');
  } catch(e){ el.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p>Could not load items.</p></div>`; }
}

async function submitAction(recordID,idx,btn){
  const actionTaken=document.getElementById('act-'+idx).value.trim();
  if(!actionTaken){ toast('Please describe the action taken','error'); return; }
  btn.disabled=true; btn.textContent='Submitting...';
  try{
    const res=await apiPost({action:'submitAction',recordID,teacherEmail:APP.user.email,actionTaken});
    if(res.status==='success'){ toast('Action Taken submitted ✅','success'); switchTab('action-taken'); }
    else { toast('Error: '+res.message,'error'); btn.disabled=false; btn.textContent='📝 Submit Action Taken'; }
  } catch(e){ toast('Connection error','error'); btn.disabled=false; btn.textContent='📝 Submit Action Taken'; }
}

// Teacher profile / update classes
function renderMyProfile(el){
  const school=APP.user.schoolName;
  const classes=SCHOOL_CLASSES[school]||[];
  APP.setupRows=0;
  el.innerHTML=`
    <div class="card">
      <div class="card-title">👤 My Classes and Subjects</div>
      <div class="info-box">Update the classes you currently teach. This replaces your previous setup.</div>
      <div id="assignment-rows-profile"></div>
      <button class="btn-add-row" onclick="addProfileRow()">＋ Add Class</button>
      <button class="btn-submit" style="margin-top:14px;" onclick="saveProfileSetup()">✅ Update My Classes</button>
    </div>`;
  addProfileRow();
}

function addProfileRow(){
  APP.setupRows++;
  const idx=APP.setupRows;
  const school=APP.user.schoolName;
  const classes=SCHOOL_CLASSES[school]||[];
  const classOpts=classes.map(c=>`<option value="${c}">${c}</option>`).join('');
  const secOpts=SECTIONS.map(s=>`<option value="${s}">${s}</option>`).join('');
  const div=document.createElement('div');
  div.className='assignment-row'; div.id='prow-'+idx;
  div.innerHTML=`
    <select class="form-control" id="psubj-${idx}"><option value="">Subject</option><option value="${APP.user.department}">${APP.user.department}</option></select>
    <select class="form-control" id="pcls-${idx}"><option value="">Class</option>${classOpts}</select>
    <select class="form-control" id="psec-${idx}"><option value="">Section</option>${secOpts}</select>
    <button class="btn-remove-row" onclick="document.getElementById('prow-${idx}').remove()">✕</button>`;
  document.getElementById('assignment-rows-profile').appendChild(div);
}

async function saveProfileSetup(){
  const rows=document.querySelectorAll('[id^="prow-"]');
  const assignments=[];
  rows.forEach(row=>{
    const idx=row.id.replace('prow-','');
    const s=document.getElementById('psubj-'+idx)?.value;
    const c=document.getElementById('pcls-'+idx)?.value;
    const sec=document.getElementById('psec-'+idx)?.value;
    if(s&&c&&sec) assignments.push({subject:s,class:c,section:sec});
  });
  if(!assignments.length){ toast('Please add at least one class','error'); return; }
  try{
    const res=await apiPost({action:'saveAssignments',teacherEmail:APP.user.email,teacherName:APP.user.fullName,schoolName:APP.user.schoolName,department:APP.user.department,assignments});
    if(res.status==='success') toast('Classes updated ✅','success');
    else toast('Error: '+res.message,'error');
  } catch(e){ toast('Connection error','error'); }
}

async function addUser(){

// BULK UPLOAD
// ══════════════════════════════════════════════════════
function renderBulkUpload(el){
  el.innerHTML=`
    <div class="card">
      <div class="card-title">⬆️ Bulk Upload Users</div>
      <div class="info-box"><strong>Required CSV columns:</strong><br><br>FullName, Email, Role, SchoolName, Department</div>
      <div class="form-group" style="margin-top:12px;">
        <label class="form-label">Select CSV File</label>
        <input type="file" accept=".csv" class="form-control" id="csv-file" onchange="previewCSV()"/>
      </div>
      <div id="csv-preview" style="font-size:12px;color:var(--gray);margin:6px 0;"></div>
      <button class="btn-submit" id="btn-upload" onclick="uploadCSV()" disabled>⬆️ Upload Users</button>
    </div>
    <div class="card">
      <div class="card-title">📥 Download Template</div>
      <p style="font-size:13px;color:var(--gray);margin-bottom:10px;">Download a ready-to-fill CSV template.</p>
      <button class="btn-secondary" onclick="downloadTemplate()">📥 Download Template</button>
    </div>`;
}

function previewCSV(){
  const file=document.getElementById('csv-file').files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    document.getElementById('csv-preview').textContent=`${lines.length-1} records found (excluding header)`;
    document.getElementById('btn-upload').disabled=false;
  };
  reader.readAsText(file);
}

async function uploadCSV(){
  const file=document.getElementById('csv-file').files[0];
  if(!file) return;
  const btn=document.getElementById('btn-upload');
  btn.disabled=true; btn.textContent='Uploading...';
  const reader=new FileReader();
  reader.onload=async e=>{
    const lines=e.target.result.split('\n').filter(l=>l.trim());
    const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    const users=[];
    for(let i=1;i<lines.length;i++){
      const vals=lines[i].split(',').map(v=>v.trim().replace(/"/g,''));
      if(!vals[0]) continue;
      const user={};
      headers.forEach((h,idx)=>user[h]=vals[idx]||'');
      users.push(user);
    }
    try{
      const res=await apiPost({action:'bulkUpload',users,uploadedBy:APP.user.email});
      if(res.status==='success') toast(`✅ ${res.usersAdded} users uploaded`,'success');
      else toast('Upload failed: '+res.message,'error');
    } catch(err){ toast('Connection error during upload','error'); }
    btn.disabled=false; btn.textContent='⬆️ Upload Users';
  };
  reader.readAsText(file);
}

function downloadTemplate(){
  const h='FullName,Email,Role,SchoolName,Department';
  const s='Priya Kumar,priya.kumar@mgsnagpur.org,Teacher,SOS Atrey,English';
  const blob=new Blob([h+'\n'+s],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='MGS_CRO_User_Template.csv';
  a.click();
}
